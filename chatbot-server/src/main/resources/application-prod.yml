spring:
  datasource:
    url: ${DATABASE_URL_JDBC}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  redis:
    host: ${REDISHOST}
    port: ${REDISPORT}
    username: ${REDISUSER}
    password: ${REDISPASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false