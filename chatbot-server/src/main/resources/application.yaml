spring:
  application:
    name: chatbot
  profiles:
    # 활성화할 프로필 설정 (기본값: dev)
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    # JPA 세션을 컨트롤러 이후에 닫음
    open-in-view: false

openai:
  api-key: ${OPENAI_API_KEY}
  api-url: https://api.openai.com/v1/chat/completions
  model: gpt-3.5-turbo

jwt:
  secret: ${SECRET_KEY}
  access-token-validity: ${ACCESS_TOKEN_VALIDITY:3600000}
  refresh-token-validity: ${REFRESH_TOKEN_VALIDITY:604800000}

frontend:
  url: ${FRONTEND_URL}

# 서버 포트
server:
  port: ${PORT}
