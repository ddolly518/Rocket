spring:
  application:
    name: chatbot
  profiles:
    # 활성화할 프로필 설정 (기본값: dev)
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    # JPA 세션을 컨트롤러 이후에 닫음
    open-in-view: false
  redis:
    host: localhost
    port: 6379

openai:
  api-key: ${OPENAI_API_KEY}
  api-url: https://api.openai.com/v1/chat/completions
  model: gpt-3.5-turbo

jwt:
  secret: ${SECRET_KEY:this-is-a-very-long-secret-key-for-jwt-hs256-123456}
  access-token-validity: ${ACCESS_TOKEN_VALIDITY:3600000}
  refresh-token-validity: ${REFRESH_TOKEN_VALIDITY:604800000}

# 서버 포트
server:
  port: 8080
