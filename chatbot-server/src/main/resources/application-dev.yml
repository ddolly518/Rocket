spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/rocket
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 테이블 자동 생성/수정
      ddl-auto: update
    # 실행되는 SQL을 콘솔에 출력
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect